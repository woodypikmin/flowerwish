<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 麥田許願池</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-pink-50 min-h-screen font-sans p-4 md:p-8">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ★ 記得替換成你的 Google Apps Script 部署網址
        const API_URL = "https://script.google.com/macros/s/AKfycbyQNQT0SKOnygi_UJyDu5zzlKsGR4qD_XcSiaS0lDsrq-4UMCrNJ86EM1HcjMZV0WFD/exec"; 

        const getLocalISODate = () => {
            const d = new Date();
            d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
            return d.toISOString().slice(0, 10);
        };

        const FLOWER_DATA = {
            "銀蓮花": ["白", "黃", "紅", "藍"], "九重葛": ["白", "黃", "紅", "藍"], "海芋": ["白", "黃", "紅", "藍"],
            "山茶花": ["白", "黃", "紅", "藍"], "油菜花": ["白", "黃", "藍"], "康乃馨": ["白", "黃", "紅", "藍"],
            "嘉德麗雅蘭": ["白", "黃", "紅", "藍"], "雞冠花": ["白", "黃", "紅", "藍"], "櫻花": ["白"],
            "菊花": ["白", "黃", "紅", "藍"], "鐵線蓮": ["白", "黃", "紅", "藍"], "彼岸花": ["白", "黃", "紅"],
            "鈴蘭": ["白", "紅"], "大波斯菊": ["白", "黃", "紅"], "兔耳花": ["白", "紅", "藍"],
            "大理花": ["白", "黃", "紅", "藍"], "石竹": ["白", "紅", "藍"], "小蒼蘭": ["白", "黃", "紅", "藍"],
            "龍膽": ["白", "紅", "藍"], "聖誕玫瑰": ["白", "黃", "紅", "藍"], "扶桑花": ["白", "黃", "紅", "藍"],
            "風信子": ["白", "黃", "紅", "藍"], "繡球花": ["白", "紅", "藍"], "鳶尾花": ["白", "黃", "紅", "藍"],
            "百合": ["白", "黃", "紅"], "萬壽菊": ["白", "黃", "紅"], "牽牛花": ["白", "黃", "紅", "藍"],
            "蝴蝶蘭": ["白", "黃", "紅", "藍"], "水仙": ["白", "黃"], "粉蝶花": ["藍"],
            "睡蓮": ["白", "黃", "紅", "藍"], "三色菫": ["白", "黃", "紅", "藍"], "牡丹": ["白", "黃", "紅", "藍"],
            "矮牽牛": ["白", "黃", "紅", "藍"], "梅花": ["白", "黃", "紅"], "雞蛋花": ["白", "黃", "紅"],
            "聖誕紅": ["白", "黃", "紅", "藍"], "櫻草花": ["白", "黃", "紅", "藍"], "玫瑰": ["白", "黃", "紅", "藍"],
            "週年紀念玫瑰": ["白", "黃", "紅", "藍"], "鼠尾草": ["白", "黃", "紅", "藍"], "金魚草": ["白", "黃", "紅", "藍"],
            "雪花蓮": ["白", "黃", "紅"], "天堂鳥": ["白", "黃", "紅"], "向日葵": ["黃"],
            "豌豆花": ["白", "黃", "紅", "藍"], "鬱金香": ["白", "黃", "紅", "藍"], "鸚鵡鬱金香": ["白", "黃", "紅", "藍"]
        };

        const App = () => {
            const [name, setName] = useState("");
            const [flower, setFlower] = useState("");
            const [color, setColor] = useState("");
            
            const [requests, setRequests] = useState([]);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [isLoading, setIsLoading] = useState(true);

            const fetchRequests = async () => {
                setIsLoading(true);
                try {
                    const res = await fetch(API_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'get' })
                    });
                    const data = await res.json();
                    setRequests(data.reverse()); 
                } catch (error) {
                    console.error("讀取失敗", error);
                } finally {
                    setIsLoading(false);
                }
            };

            useEffect(() => {
                fetchRequests();
            }, []);

            const handleFlowerChange = (e) => {
                setFlower(e.target.value);
                setColor(""); 
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                
                // ★ 前端先檢查一次是否重複
                const isDuplicate = requests.some(req => req.name === name.trim());
                if (isDuplicate) {
                    alert("你今天已經許過願囉！一天只能許願一次喔！");
                    return;
                }

                setIsSubmitting(true);

                try {
                    const res = await fetch(API_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'add', name, flower, color })
                    });
                    const result = await res.json();
                    
                    // 接收後端回傳的結果，防護網頁同時開啟送出的漏洞
                    if (result.status === "error") {
                        alert(result.message);
                    } else {
                        setName("");
                        setFlower("");
                        setColor("");
                        await fetchRequests();
                    }
                } catch (error) {
                    alert("送出失敗，請稍後再試！");
                } finally {
                    setIsSubmitting(false);
                }
            };

            const availableColors = flower ? FLOWER_DATA[flower] : [];

            const getColorStyle = (c) => {
                switch(c) {
                    case '白': return 'bg-slate-100 text-slate-600 border-slate-200';
                    case '黃': return 'bg-yellow-100 text-yellow-700 border-yellow-200';
                    case '紅': return 'bg-red-100 text-red-700 border-red-200';
                    case '藍': return 'bg-blue-100 text-blue-700 border-blue-200';
                    default: return 'bg-gray-100 text-gray-700';
                }
            };

            const todayDate = getLocalISODate(); 

            return (
                <div className="max-w-xl mx-auto space-y-6">
                    <div className="text-center py-6">
                        <h1 className="text-3xl font-black text-pink-600 mb-2">🌸 {todayDate} 麥田許願池</h1>
                        <p className="text-sm text-pink-500/80 font-bold">資料將於每日00:00重置</p>
                    </div>

                    {/* 許願表單 */}
                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-pink-100">
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <div className="flex justify-between items-end mb-1">
                                    <label className="block text-sm font-bold text-slate-600">你是誰？</label>
                                    <span className="text-[10px] text-pink-500 font-bold bg-pink-50 px-2 py-0.5 rounded">⚠️ 一人一天限許一次</span>
                                </div>
                                <input required type="text" value={name} onChange={e => setName(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-400" />
                            </div>
                            
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-bold text-slate-600 mb-1">缺什麼花？</label>
                                    <select required value={flower} onChange={handleFlowerChange} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-400">
                                        <option value="" disabled>請選擇花朵</option>
                                        {Object.keys(FLOWER_DATA).map(f => <option key={f} value={f}>{f}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-slate-600 mb-1">缺什麼顏色？</label>
                                    <select required value={color} onChange={e => setColor(e.target.value)} disabled={!flower} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-400 disabled:opacity-50">
                                        <option value="" disabled>{flower ? "請選擇顏色" : "請先選擇花朵"}</option>
                                        {availableColors.map(c => <option key={c} value={c}>{c}色</option>)}
                                    </select>
                                </div>
                            </div>

                            <button type="submit" disabled={isSubmitting} className="w-full py-3.5 mt-2 bg-gradient-to-r from-pink-500 to-rose-500 text-white font-black rounded-xl shadow-md hover:shadow-lg transition-all active:scale-95 disabled:opacity-50">
                                {isSubmitting ? '丟入許願池中...' : '✨ 丟入許願池'}
                            </button>
                        </form>
                    </div>

                    {/* 許願清單 */}
                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-pink-100">
                        <h2 className="text-lg font-black text-slate-700 mb-4 flex items-center justify-between">
                            <span>📋 大家許什麼?</span>
                            <span className="text-xs bg-slate-100 text-slate-500 px-2 py-1 rounded-lg">共 {requests.length} 筆</span>
                        </h2>
                        
                        {isLoading ? (
                            <div className="text-center text-slate-400 py-8 animate-pulse">讀取中...</div>
                        ) : requests.length === 0 ? (
                            <div className="text-center text-slate-400 py-8">今天還沒有人許願，可以放假了好欸</div>
                        ) : (
                            <div className="space-y-3">
                                {requests.map((req, i) => (
                                    <div key={i} className="flex items-center justify-between p-3 bg-slate-50 rounded-xl border border-slate-100 hover:border-pink-200 transition-colors">
                                        <div className="flex flex-col">
                                            <span className="font-bold text-slate-700">{req.name}</span>
                                            <span className="text-[10px] text-slate-400">{new Date(req.time).toLocaleTimeString('zh-TW', {hour: '2-digit', minute:'2-digit'})}</span>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <span className="text-sm font-black text-slate-600">{req.flower}</span>
                                            <span className={`text-xs font-bold px-2 py-1 rounded-md border ${getColorStyle(req.color)}`}>{req.color}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
